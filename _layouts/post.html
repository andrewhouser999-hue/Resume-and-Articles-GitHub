---
layout: default
---
<article class="post h-entry" itemscope itemtype="http://schema.org/BlogPosting">

  <header class="post-header">
    <h1 class="post-title p-name" itemprop="name headline">{{ page.title | escape }}</h1>
    <p class="post-meta">
      <time class="dt-published" datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished">
        {%- assign date_format = site.minima.date_format | default: "%b %-d, %Y" -%}
        {{ page.date | date: date_format }}
      </time>
      {%- if page.author %}
        &nbsp;&bull;&nbsp;<span itemprop="author" itemscope itemtype="http://schema.org/Person"><span class="p-author h-card" itemprop="name">{{ page.author }}</span></span>
      {%- endif %}
    </p>
  </header>

  <div style="margin: 20px 0;">
    <img src="{{ "/assets/images/andy-finance-photo-original.png" | relative_url }}" alt="Andrew J. Houser" style="width: 102px; border-radius: 8px; box-shadow: 2px 4px 10px rgba(0,0,0,0.25), 0 1px 3px rgba(0,0,0,0.15);">
  </div>

  <div class="post-content e-content" itemprop="articleBody">
    {{ content }}
  </div>

  <a class="u-url" href="{{ page.url | relative_url }}" hidden></a>

</article>
